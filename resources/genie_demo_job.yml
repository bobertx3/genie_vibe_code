resources:
  jobs:
    genie_demo_job:
      name: "[${bundle.target}] Genie Demo - Pipeline Refresh"
      tasks:
        - task_key: "refresh_pipeline"
          pipeline_task:
            pipeline_id: ${resources.pipelines.genie_demo_pipeline.id}
            full_refresh: false
      schedule:
        quartz_cron_expression: "0 0 8 * * ?"
        timezone_id: "America/Los_Angeles"
      permissions:
        - level: CAN_VIEW
          group_name: "users"
